<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Email Preview</title>
    <style>body { background: #f3f4f6; margin: 0; padding: 40px 0; }</style>
</head>
<body>
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 40px 20px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <h1 style="font-size: 24px; font-weight: 600; color: #111827; margin: 0;">LoopBoard Analytics</h1>
        </div>
        <div style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px;">
            <h2 style="font-size: 20px; font-weight: 600; color: #111827; margin: 0 0 8px;">You're invited!</h2>
            <p style="color: #6b7280; font-size: 15px; line-height: 1.6; margin: 0 0 24px;">
                <strong>Demo User</strong> has invited you to join <strong>ShopMetrics Demo</strong> as
                <strong style="text-transform: capitalize;">analyst</strong>.
            </p>
            <div style="text-align: center; margin: 32px 0;">
                <a href="#"
                   style="display: inline-block; background: #2563eb; color: #ffffff; font-size: 15px;
                          font-weight: 600; padding: 12px 32px; border-radius: 8px; text-decoration: none;">
                    Accept Invitation
                </a>
            </div>
            <p style="color: #9ca3af; font-size: 13px; line-height: 1.5; margin: 24px 0 0;">
                This invitation expires in 7 days. If you didn't expect this, you can safely ignore it.
            </p>
            <hr style="border: none; border-top: 1px solid #f3f4f6; margin: 24px 0 16px;" />
            <p style="color: #9ca3af; font-size: 12px; margin: 0;">
                Can't click the button? Copy this link:<br/>
                <a href="#" style="color: #2563eb; word-break: break-all;">http://localhost:3000/invite/abc123def456...</a>
            </p>
        </div>
    </div>
</body>
</html>
