<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Email Preview</title>
    <style>body { background: #f3f4f6; margin: 0; padding: 40px 0; }</style>
</head>
<body>
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 40px 20px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <h1 style="font-size: 24px; font-weight: 600; color: #111827; margin: 0;">LoopBoard Analytics</h1>
        </div>
        <div style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px;">
            <div style="display: inline-block; background: #dc2626; color: #fff; font-size: 12px;
                        font-weight: 600; padding: 4px 10px; border-radius: 4px; text-transform: uppercase;
                        margin-bottom: 16px;">
                critical
            </div>
            <h2 style="font-size: 20px; font-weight: 600; color: #111827; margin: 0 0 16px;">High Error Rate</h2>
            <table style="width: 100%; border-collapse: collapse; font-size: 14px; color: #374151;">
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Organization</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">ShopMetrics Demo</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Event Type</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">error</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Condition</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">count &gt; 15</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Actual Value</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 600; color: #dc2626;">23</td>
                </tr>
            </table>
            <div style="text-align: center; margin-top: 24px;">
                <a href="#"
                   style="display: inline-block; background: #2563eb; color: #ffffff; font-size: 14px;
                          font-weight: 600; padding: 10px 24px; border-radius: 8px; text-decoration: none;">
                    View Alerts
                </a>
            </div>
        </div>
    </div>

    <!-- WARNING severity variant -->
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 40px auto 0; padding: 0 20px 40px;">
        <div style="text-align: center; margin-bottom: 16px;">
            <p style="color: #9ca3af; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Warning variant</p>
        </div>
        <div style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px;">
            <div style="display: inline-block; background: #f59e0b; color: #fff; font-size: 12px;
                        font-weight: 600; padding: 4px 10px; border-radius: 4px; text-transform: uppercase;
                        margin-bottom: 16px;">
                warning
            </div>
            <h2 style="font-size: 20px; font-weight: 600; color: #111827; margin: 0 0 16px;">Revenue Drop Alert</h2>
            <table style="width: 100%; border-collapse: collapse; font-size: 14px; color: #374151;">
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Organization</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">ShopMetrics Demo</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Event Type</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">purchase</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Condition</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 500;">sum &lt; 50</td>
                </tr>
                <tr>
                    <td style="padding: 8px 0; color: #6b7280;">Actual Value</td>
                    <td style="padding: 8px 0; text-align: right; font-weight: 600; color: #f59e0b;">$32.50</td>
                </tr>
            </table>
            <div style="text-align: center; margin-top: 24px;">
                <a href="#"
                   style="display: inline-block; background: #2563eb; color: #ffffff; font-size: 14px;
                          font-weight: 600; padding: 10px 24px; border-radius: 8px; text-decoration: none;">
                    View Alerts
                </a>
            </div>
        </div>
    </div>
</body>
</html>
