services:
  # Backend API
  - type: web
    name: loopboard-api
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loopboard-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: CELERY_BROKER_URL
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_SENDER_NAME
        value: LoopBoard Analytics
      - key: PYTHON_VERSION
        value: "3.11.9"

  # Celery Worker
  - type: worker
    name: loopboard-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loopboard-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: CELERY_BROKER_URL
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: loopboard-redis
          type: redis
          property: connectionURI
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

  # Redis
  - type: redis
    name: loopboard-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: loopboard-db
    plan: free
